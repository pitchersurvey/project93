<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>투수 통합 평가 시스템 v6.0</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0a;
  --bg2: #111111;
  --bg3: #1a1a1a;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.15);
  --text: #f0f0f0;
  --text2: #888;
  --text3: #555;
  --accent: #e8ff47;
  --accent2: #ff6b35;
  --red: #ff4444;
  --green: #47ff8a;
  --blue: #4488ff;
  --amber: #ffaa33;
  --radius: 12px;
  --radius-sm: 8px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  line-height: 1.6;
  min-height: 100vh;
}

/* HEADER */
.header {
  border-bottom: 1px solid var(--border);
  padding: 20px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  background: rgba(10,10,10,0.95);
  backdrop-filter: blur(10px);
  z-index: 100;
}
.logo {
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  color: var(--accent);
  letter-spacing: 0.05em;
}
.prog-wrap {
  display: flex;
  align-items: center;
  gap: 12px;
}
.prog-text {
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  color: var(--text2);
}
.prog-bar {
  width: 120px;
  height: 3px;
  background: var(--bg3);
  border-radius: 2px;
  overflow: hidden;
}
.prog-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  transition: width 0.4s ease;
}

/* HERO */
.hero {
  padding: 60px 24px 48px;
  max-width: 720px;
  margin: 0 auto;
}
.hero-label {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--accent);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  margin-bottom: 16px;
}
.hero h1 {
  font-size: clamp(28px, 5vw, 42px);
  font-weight: 600;
  line-height: 1.15;
  margin-bottom: 16px;
  letter-spacing: -0.02em;
}
.hero h1 span { color: var(--accent); }
.hero p {
  color: var(--text2);
  font-size: 14px;
  max-width: 480px;
  line-height: 1.7;
  margin-bottom: 24px;
}
.badges {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}
.badge {
  font-size: 11px;
  padding: 4px 10px;
  border-radius: 20px;
  font-weight: 500;
  border: 1px solid;
}
.badge-vel { color: #47ff8a; border-color: rgba(71,255,138,0.3); background: rgba(71,255,138,0.08); }
.badge-inj { color: #ff6b6b; border-color: rgba(255,107,107,0.3); background: rgba(255,107,107,0.08); }
.badge-both { color: #b8a4ff; border-color: rgba(184,164,255,0.3); background: rgba(184,164,255,0.08); }
.badge-stab { color: #ffaa33; border-color: rgba(255,170,51,0.3); background: rgba(255,170,51,0.08); }

/* MAIN */
.main {
  max-width: 720px;
  margin: 0 auto;
  padding: 0 24px 80px;
}

/* SECTION */
.section { margin-bottom: 40px; }
.sec-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 16px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
}
.sec-num {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--accent);
  letter-spacing: 0.1em;
}
.sec-title {
  font-size: 14px;
  font-weight: 500;
  color: var(--text);
}
.sec-desc {
  font-size: 12px;
  color: var(--text3);
  margin-left: auto;
}

/* QUESTION CARD */
.q-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 10px;
  transition: border-color 0.2s;
}
.q-card:has(.opt.sel) { border-color: rgba(232,255,71,0.2); }
.q-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 10px;
}
.q-num {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--text3);
}
.q-badge {
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 20px;
  font-weight: 500;
}
.q-text {
  font-size: 14px;
  color: var(--text);
  line-height: 1.6;
  margin-bottom: 10px;
  font-weight: 500;
}
.q-sub {
  font-size: 12px;
  color: var(--text2);
  margin-bottom: 12px;
  line-height: 1.6;
  padding: 8px 12px;
  background: var(--bg3);
  border-radius: var(--radius-sm);
  border-left: 2px solid var(--border2);
}

/* BENCH TABLE */
.bench-wrap {
  margin-bottom: 12px;
  overflow-x: auto;
}
.bench-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
}
.bench-table th {
  text-align: left;
  padding: 6px 10px;
  color: var(--text3);
  font-weight: 500;
  background: var(--bg3);
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.05em;
}
.bench-table td {
  padding: 6px 10px;
  border-top: 1px solid var(--border);
  color: var(--text2);
}
.bench-table tr:last-child td {
  color: var(--accent);
  font-weight: 500;
}

/* OPTIONS */
.opts { display: flex; flex-direction: column; gap: 6px; }
.opt {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 10px 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 13px;
  color: var(--text2);
  background: transparent;
  text-align: left;
  width: 100%;
  transition: all 0.15s;
  line-height: 1.5;
}
.opt:hover { border-color: var(--border2); color: var(--text); background: var(--bg3); }
.opt.sel {
  border-color: var(--accent);
  background: rgba(232,255,71,0.06);
  color: var(--accent);
}
.opt-k {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--text3);
  min-width: 16px;
  padding-top: 1px;
  flex-shrink: 0;
}
.opt.sel .opt-k { color: var(--accent); }

/* NOTE */
.q-note {
  font-size: 11px;
  color: var(--text3);
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px solid var(--border);
  line-height: 1.6;
}

/* SUBMIT */
.submit-wrap {
  padding: 32px 0;
}
.submit-btn {
  width: 100%;
  padding: 16px;
  background: var(--accent);
  border: none;
  border-radius: var(--radius);
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  color: #0a0a0a;
  font-family: 'DM Sans', sans-serif;
  letter-spacing: -0.01em;
  transition: all 0.2s;
}
.submit-btn:hover:not(:disabled) { background: #f5ff6e; transform: translateY(-1px); }
.submit-btn:disabled { opacity: 0.25; cursor: not-allowed; transform: none; }

/* RESULT */
.result { padding: 40px 0; }

.r-hero {
  margin-bottom: 32px;
  padding: 32px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  position: relative;
  overflow: hidden;
}
.r-hero::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--accent), transparent);
}
.r-label {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--accent);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  margin-bottom: 8px;
}
.r-type {
  font-size: 22px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 10px;
  letter-spacing: -0.02em;
  line-height: 1.3;
}
.r-desc {
  font-size: 13px;
  color: var(--text2);
  line-height: 1.7;
  max-width: 560px;
}

/* SCORE GRID */
.score-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-bottom: 24px;
}
@media (max-width: 480px) { .score-grid { grid-template-columns: repeat(2, 1fr); } }
.score-card {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 14px;
}
.score-lbl {
  font-size: 11px;
  color: var(--text3);
  margin-bottom: 8px;
  font-family: 'DM Mono', monospace;
  letter-spacing: 0.05em;
}
.score-bar-bg {
  height: 4px;
  background: var(--bg);
  border-radius: 2px;
  margin-bottom: 8px;
  overflow: hidden;
}
.score-bar { height: 100%; border-radius: 2px; transition: width 1s ease; }
.score-val {
  font-size: 22px;
  font-weight: 600;
  font-family: 'DM Mono', monospace;
  letter-spacing: -0.02em;
}
.score-sub { font-size: 11px; color: var(--text3); }

/* ALERTS */
.alert {
  padding: 12px 16px;
  border-radius: var(--radius-sm);
  margin-bottom: 10px;
  font-size: 12px;
  line-height: 1.7;
  border: 1px solid;
}
.alert-red { background: rgba(255,68,68,0.08); border-color: rgba(255,68,68,0.25); color: #ff8888; }
.alert-amber { background: rgba(255,170,51,0.08); border-color: rgba(255,170,51,0.25); color: #ffbb66; }
.alert-green { background: rgba(71,255,138,0.08); border-color: rgba(71,255,138,0.25); color: #66ffaa; }

/* TAGS */
.tag-row { margin-bottom: 14px; }
.tag-lbl {
  font-size: 11px;
  font-weight: 500;
  color: var(--text3);
  margin-bottom: 6px;
  font-family: 'DM Mono', monospace;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}
.tag {
  display: inline-block;
  font-size: 11px;
  padding: 4px 10px;
  border-radius: 20px;
  margin: 3px 3px 0 0;
  font-weight: 500;
}
.tag-risk { background: rgba(255,68,68,0.12); color: #ff8888; border: 1px solid rgba(255,68,68,0.2); }
.tag-fix { background: rgba(71,255,138,0.1); color: #66ffaa; border: 1px solid rgba(71,255,138,0.2); }

/* DETAIL SECTIONS */
.detail-block {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: 12px;
}
.detail-header {
  padding: 12px 20px;
  font-size: 12px;
  font-weight: 500;
  color: var(--text2);
  background: var(--bg3);
  border-bottom: 1px solid var(--border);
  font-family: 'DM Mono', monospace;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}
.detail-body {
  padding: 20px;
  font-size: 13px;
  color: var(--text2);
  line-height: 1.9;
}
.detail-body b { color: var(--text); font-weight: 500; }

/* PRESCRIPTION */
.prio-item {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
}
.prio-item:last-child { border-bottom: none; }
.prio-tag {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--accent);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 4px;
}
.prio-title { font-size: 14px; font-weight: 500; color: var(--text); margin-bottom: 4px; }
.prio-desc { font-size: 12px; color: var(--text2); line-height: 1.7; }

/* RESET */
.reset-btn {
  display: block;
  width: 100%;
  padding: 14px;
  background: transparent;
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  font-size: 13px;
  color: var(--text2);
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  margin-top: 16px;
  transition: all 0.15s;
}
.reset-btn:hover { border-color: var(--border2); color: var(--text); background: var(--bg2); }

/* SCROLLBAR */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 3px; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">PITCHER / ASSESSMENT v6.0</div>
  <div class="prog-wrap">
    <span class="prog-text" id="prog-txt">0 / 36</span>
    <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
  </div>
</div>

<div id="app">
  <div class="hero">
    <div class="hero-label">Sports Science Based Evaluation</div>
    <h1>투수 통합<br><span>평가 시스템</span></h1>
    <p>MLB 바이오메카닉스 + 스포츠 과학 논문 기반의 투수 전용 자가 진단.<br>메카닉 파트는 실제 감각 그대로, 피지컬 파트는 테스트 후 답하세요.</p>
    <div class="badges">
      <span class="badge badge-vel">구속</span>
      <span class="badge badge-inj">부상예방</span>
      <span class="badge badge-both">구속+부상예방</span>
      <span class="badge badge-stab">안정성</span>
    </div>
  </div>

  <div class="main">
    <div id="questions"></div>
    <div class="submit-wrap">
      <button class="submit-btn" id="submit-btn" disabled onclick="showResult()">결과 분석하기 →</button>
    </div>
    <div id="result"></div>
  </div>
</div>

<script>
const SECTIONS = [
  {
    num:'01', title:'정적 자세 & 기본 움직임 패턴', desc:'일상 움직임 기반 스크리닝',
    qs:[
      {id:'q1',badge:'bi',bLabel:'부상예방',q:'팔을 옆으로 들어올릴 때 어깨가 어떻게 되나요?',
       opts:['어깨 전체가 귀 쪽으로 같이 올라간다','어깨는 거의 그대로, 팔만 올라간다','확인하기 어렵다'],
       note:'견갑골 상방회전 패턴 — A는 상부 승모근 우세·전거근 약화. 투구 가속 구간에서 팔꿈치 부담 증가'},
      {id:'q2',badge:'bi',bLabel:'부상예방',q:'바닥에 있는 물건을 집을 때 자연스럽게 어떻게 하나요?',
       opts:['허리를 앞으로 숙여서 든다','무릎을 굽히고 엉덩이를 뒤로 빼며 내려간다','무릎을 굽히지만 상체도 많이 숙인다'],
       note:'힙 힌지 패턴 — 투구 로딩 단계 햄스트링·둔근 활성화와 직결'},
      {id:'q3',badge:'bi',bLabel:'부상예방',q:'등을 벽에 기대고 서 보세요. 어깨뼈(날개뼈) 상태는?',
       sub:'거울로 뒷모습을 보거나 다른 사람에게 확인해달라 해도 됩니다.',
       opts:['한쪽 어깨뼈가 날개처럼 뜨거나 튀어나와 있다','양쪽이 비슷하게 납작하게 붙어 있다'],
       note:'견갑골 이상운동(Scapular Dyskinesis) 선별 — 이 패턴 있는 투수 어깨 부상 위험 25~43% 증가 (Hickey et al., 2018)'},
      {id:'q4',badge:'bi',bLabel:'부상예방',q:'허리를 펼 때 어느 부위가 먼저 움직이나요?',
       opts:['허리(요추)가 먼저 꺾인다','엉덩이가 먼저 열리며 허리가 따라온다','잘 구분이 안 된다'],
       note:'요추-골반 리듬 — A는 요추 과가동성·고관절 가동범위 부족 패턴. 투구 시 요추 부하 증가'},
    ]
  },
  {
    num:'02', title:'투구 메카닉스 — 로딩 & 스트라이드', desc:'힘 저장 구간 감각 기술형',
    qs:[
      {id:'q5',badge:'bb',bLabel:'구속+부상예방',q:'뒷발로 지면을 밀 때 힘이 어느 방향으로 향하나요?',
       sub:'눈을 감고 실제 동작을 천천히 재현하며 답하세요.',
       opts:['위로 솟구치는 느낌 (몸이 뜬다)','홈 플레이트 방향으로 밀리는 느낌','힘이 분산되어 방향을 잘 모르겠다'],
       note:'지면반력 방향 — A는 수직력 손실. 이상적 스트라이드 길이 신장의 80~87% (Fleisig et al., 프로 평균 83%)'},
      {id:'q6',badge:'bb',bLabel:'구속+부상예방',q:'앞발이 착지하는 위치는 어디인가요?',
       sub:'착지 발이 뒷발과 비교해 어느 방향에 내려가는지 느껴보세요.',
       opts:['몸 안쪽(글러브 쪽)으로 교차해서 착지한다','뒷발과 거의 일직선으로 착지한다','몸 바깥쪽(팔 쪽)으로 벌어진다'],
       note:'착지 발 위치 — A(크로스오버)는 골반 회전을 막아 구속 손실. B가 이상적'},
      {id:'q7',badge:'bb',bLabel:'구속+부상예방',q:'착지 발의 발끝 방향은?',
       opts:['홈 방향으로 정면을 향한다 (발끝이 타자 쪽)','홈 방향에서 약간 안쪽(닫힘)을 향한다 (10~20°)','홈 방향에서 바깥(열림)으로 크게 향한다'],
       note:'착지 발 각도 — B(약간 닫힘)가 이상적. A는 조기 골반 개방, C는 발목·무릎 스트레스'},
      {id:'q8',badge:'bb',bLabel:'구속+부상예방',q:'착지 순간, 골반은 어느 방향을 향하고 있나요? (우투수 기준)',
       sub:'착지 순간 배꼽이 어느 방향을 가리키는지 느껴보세요.',
       opts:['이미 홈 방향으로 완전히 열려 있다','3루 방향으로 약간 닫혀 있다 (30~40° 정도)','거의 정면으로 타자를 향하고 있다'],
       note:'착지 시 골반 각도 — B가 최적 (프로 평균 33±10° 개방). A는 hip-shoulder separation 소멸 → UCL varus torque 급증'},
    ]
  },
  {
    num:'03', title:'투구 메카닉스 — 가속 & 릴리즈', desc:'힘 전달·팔 경로 감각 기술형',
    qs:[

const TOTAL = SECTIONS.reduce((a,s)=>a+s.qs.length,0);

function benchHtml(rows) {
  if (!rows) return '';
  const head = rows[0].map(h=>`<th>${h}</th>`).join('');
  const body = rows.slice(1).map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join('')}</tr>`).join('');
  return `<div class="bench-wrap"><table class="bench-table"><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table></div>`;
}

function render() {
  const container = document.getElementById('questions');
  container.innerHTML = '';
  let qNum = 0;

  SECTIONS.forEach(sec => {
    const secDiv = document.createElement('div');
    secDiv.className = 'section';
    secDiv.innerHTML = `<div class="sec-header">
      <span class="sec-num">${sec.num}</span>
      <span class="sec-title">${sec.title}</span>
      <span class="sec-desc">${sec.desc}</span>
    </div>`;

    sec.qs.forEach(q => {
      qNum++;
      const n = qNum;
      const b = BADGE_STYLE[q.badge];
      const card = document.createElement('div');
      card.className = 'q-card';
      const opts = q.opts.map((o,i) =>
        `<button class="opt ${answers[q.id]===i?'sel':''}" onclick="pick('${q.id}',${i},this)">
          <span class="opt-k">${String.fromCharCode(65+i)}</span>
          <span>${o}</span>
        </button>`).join('');
      card.innerHTML = `
        <div class="q-meta">
          <span class="q-num">Q${n}</span>
          <span class="q-badge badge ${b.style}">${b.label}</span>
        </div>
        <div class="q-text">${q.q}</div>
        ${q.sub ? `<div class="q-sub">${q.sub}</div>` : ''}
        ${q.bench ? benchHtml(q.bench) : ''}
        <div class="opts">${opts}</div>
        ${q.note ? `<div class="q-note">📌 ${q.note}</div>` : ''}`;
      secDiv.appendChild(card);
    });
    container.appendChild(secDiv);
  });
  updateProgress();
}

function pick(id, val, el) {
  answers[id] = val;
  el.closest('.opts').querySelectorAll('.opt').forEach(b => b.classList.remove('sel'));
  el.classList.add('sel');
  updateProgress();
}

function updateProgress() {
  const done = Object.keys(answers).length;
  const pct = Math.round(done / TOTAL * 100);
  document.getElementById('prog-txt').textContent = `${done} / ${TOTAL}`;
  document.getElementById('prog-fill').style.width = `${pct}%`;
  document.getElementById('submit-btn').disabled = done < TOTAL;
}

const SCORE_MAP = {
  q1:{inj:[0,1,0.5]}, q2:{inj:[0,1,0.5]}, q3:{inj:[0,1]}, q4:{inj:[0,1,0]},
  q5:{vel:[0,1,0.5],seq:[0,1,0.5]}, q6:{vel:[0,1,0.5],seq:[0,1,0.5]},
  q7:{vel:[0,1,0.5],seq:[0.5,1,0]}, q8:{vel:[0,1,0.5],inj:[0,1,0.5],seq:[0,1,0.5]},
  q9:{vel:[0,1,0],inj:[0,1,0],seq:[0,1,0]}, q10:{vel:[0,1,0],seq:[0,1,0]},
  q11:{vel:[0.5,1,0],inj:[0,1,0],seq:[0.5,1,0]}, q12:{vel:[0.5,1,0],inj:[0,1,0.5],seq:[0.5,1,0]},
  q13:{vel:[0,1,0],seq:[0,1,0]}, q14:{vel:[0,1,0],inj:[0,1,0]}, q15:{vel:[0.5,1,0],inj:[0,1,0]},
  q16:{power:[0,0.33,0.67,1],vel:[0,0.33,0.67,1]},
  q17:{power:[0,0.33,0.67,1],vel:[0,0.33,0.67,1]},
  q18:{power:[0,0.33,0.67,1],vel:[0,0.33,0.67,1]},
  q19:{power:[0,0.33,0.67,1],stab:[0,0.33,0.67,1]},
  q20:{power:[0,0.33,0.67,1],vel:[0,0.33,0.67,1]},
  q21:{power:[0,0.33,0.67,1],vel:[0,0.33,0.67,1]},
  q22:{power:[0,0.33,0.67,1],vel:[0,0.33,0.67,1]},
  q23:{vel:[0,0.5,1],inj:[0,1,0.5]},
  q24:{mob:[0,1,0.5],inj:[0,1,0.5]},
  q25:{mob:[0,0.5,1],inj:[0,0.5,1]},
  q26:{mob:[0,0.5,1]}, q27:{mob:[0,0.5,1]}, q28:{mob:[0,1]},
  q29:{mob:[0,0.5,1],inj:[0,0.5,1]},
  q30:{stab:[0,0.5,1]}, q31:{stab:[0,0.5,1],vel:[0,0.5,1]},
  q32:{inj:[0,0,1]}, q33:{inj:[0,1]},
  q34:{vel:[0,0.5,1],stab:[0,0.5,1]},
  q35:{vel:[0.5,1,1],stab:[0,0.5,1]},
  q36:{inj:[0,0.5,1]},
};

function calcScores() {
  const axes = {vel:{s:0,m:0},inj:{s:0,m:0},power:{s:0,m:0},mob:{s:0,m:0},stab:{s:0,m:0},seq:{s:0,m:0}};
  Object.entries(SCORE_MAP).forEach(([k,v]) => {
    const a = answers[k];
    if (a === undefined) return;
    Object.entries(v).forEach(([axis, w]) => {
      if (!w || !axes[axis]) return;
      const score = Array.isArray(w) ? w[Math.min(a, w.length-1)] : w;
      const max = Array.isArray(w) ? Math.max(...w) : w;
      axes[axis].s += score;
      axes[axis].m += max;
    });
  });
  const out = {};
  Object.entries(axes).forEach(([k,v]) => { out[k] = v.m > 0 ? Math.round(v.s/v.m*100) : 0; });
  return out;
}

function bc(p) { return p>=70?'#47ff8a':p>=45?'#4488ff':'#ff4444'; }

function showResult() {
  const sc = calcScores();
  const earlyOpen = answers.q8===0 || answers.q9===2;
  const armFirst = answers.q9===2 || answers.q11===0;
  const gird = answers.q24===0 || answers.q25===0 || answers.q29===0;
  const scapDys = answers.q3===0;
  const overuse = answers.q33===0 || answers.q36===0;
  const armPain = answers.q32===0 || answers.q32===1;
  const seq = earlyOpen || armFirst;

  let type, desc, risks=[], fixes=[];
  if (seq && sc.power < 45) {
    type = 'TYPE 1 — 팔 주도 + 파워 부족형';
    desc = '착지 전에 몸이 열리고 팔이 먼저 나가는 패턴에 하체 파워까지 부족합니다. 팔꿈치·어깨에 모든 부하가 집중되는 가장 위험한 패턴이며 구속 잠재력도 크게 제한됩니다.';
    risks = ['UCL 과부하 — elbow varus torque 급증', '어깨 가속·감속 과부하', '구속 잠재력 심각하게 제한'];
    fixes = ['뒷발 수평 추진력 드릴 (매일)', '골반 선행 회전 훈련', '스쿼트 체중 1.5배 우선 달성', '착지 타이밍 지연 드릴'];
  } else if (seq && sc.power >= 45) {
    type = 'TYPE 2 — 팔 주도 + 파워 있는 형';
    desc = '하체 힘은 있지만 타이밍이 너무 빠릅니다. 구속은 어느 정도 나오지만 hip-shoulder separation이 소멸되어 장기 부상 위험이 높습니다.';
    risks = ['조기 개방 → hip-shoulder separation 소멸', 'UCL varus torque 누적 증가', '장기 팔꿈치 손상 위험'];
    fixes = ['착지 순간 골반 각도 인지 드릴', 'Hip-shoulder separation 드릴 (영상 피드백)', '코어 회전 지연 운동 (PNF)'];
  } else if (!seq && sc.mob < 45) {
    type = 'TYPE 3 — 하체 주도 + 가동성 제한형';
    desc = '운동사슬 순서는 좋지만 고관절·흉추·어깨 가동성이 부족해 힘 전달에 누수가 생기고 보상 패턴이 발생합니다.';
    risks = ['가동성 제한으로 힘 전달 손실', '보상 패턴 → GIRD 위험 증가', '흉추 제한 → 팔꿈치 부하 전가'];
    fixes = ['고관절 내회전 가동성 루틴 (매일)', 'Sleeper Stretch + Cross-body Stretch', '흉추 회전 가동성 운동', '어깨 외회전 가동성 개선'];
  } else if (!seq && sc.stab < 45) {
    type = 'TYPE 4 — 효율적이지만 안정성 부족형';
    desc = '타이밍과 가동성은 좋지만 착지 후 안정성이 부족해 피로 시 폼이 흔들립니다.';
    risks = ['착지 braking force 부족', '피로 저항성 낮음', '후반 이닝 폼 붕괴·제구 저하'];
    fixes = ['싱글레그 스쿼트 강화', '플랭크 2분+ 달성', '착지 발 안정화 드릴', '데드행 지구력 훈련'];
  } else {
    type = 'TYPE 5 — 효율적 운동사슬형 (Elite Profile)';
    desc = '파워·가동성·안정성·타이밍이 균형 잡힌 이상적인 프로파일입니다.';
    risks = overuse ? ['연간 투구 부하 과다 관리 필요'] : ['현재 특이 위험 신호 없음'];
    fixes = ['워크로드 주기화 (피크·회복)', '릴리즈 포인트 미세 최적화', '정기 가동성 유지 루틴'];
  }

  const alerts = [];
  if (gird) alerts.push(`<div class="alert alert-red">⚠️ GIRD / 후방 관절낭 긴장 의심 — 던지는 어깨 내회전이 현저히 감소했거나 투구 후 후방 어깨 뻣뻣함이 지속됩니다. 어깨·UCL 부상 위험 약 2배 증가 (Wilk et al., 2011). Sleeper Stretch + Cross-body Stretch를 즉시 시작하고 전문의 평가를 권장합니다.</div>`);
  if (scapDys) alerts.push(`<div class="alert alert-red">⚠️ 견갑골 이상운동 의심 — 한쪽 어깨뼈가 비대칭적으로 튀어나와 있습니다. 어깨 부상 위험 25~43% 증가 (Hickey et al., 2018). 전거근·하부 승모근 강화를 즉시 시작하세요.</div>`);
  if (armPain) alerts.push(`<div class="alert alert-red">⚠️ 팔꿈치·어깨 통증 감지 — 특히 팔꿈치 안쪽 통증은 UCL 손상 초기 징후일 수 있습니다. 통증이 2일 이상 지속되면 즉시 투구를 중단하고 전문의 평가를 받으세요.</div>`);
  if (overuse) alerts.push(`<div class="alert alert-amber">⚠️ 과부하 패턴 — 피로 강행 투구 또는 연중무휴 투구는 UCL 부상 위험을 급격히 높입니다. 비시즌 최소 2개월 완전 휴식 필수입니다.</div>`);
  if (!alerts.length) alerts.push(`<div class="alert alert-green">✅ 주요 급성 위험 신호 없음 — 정기적인 자기 모니터링을 유지하세요.</div>`);

  const axes = [
    ['구속 잠재력', sc.vel, 'vel'],
    ['부상 안전도', sc.inj, 'inj'],
    ['하체 파워', sc.power, 'power'],
    ['가동성', sc.mob, 'mob'],
    ['안정성', sc.stab, 'stab'],
    ['메카닉 효율', sc.seq, 'seq'],
  ];

  const axTxt = {
    vel:{hi:'운동사슬이 효율적으로 작동합니다. 릴리즈 포인트 미세 조정으로 추가 향상 가능합니다.',mid:'일부 구간에서 힘 누수가 있습니다. 타이밍과 파워를 함께 개선하면 명확한 변화가 나타납니다.',lo:'힘 전달 구조에 복수의 비효율이 있습니다. 기초 메카닉스부터 재점검이 필요합니다.'},
    inj:{hi:'현재 바이오메카닉스 패턴은 상대적으로 안전합니다.',mid:'일부 위험 패턴이 존재합니다. 타이밍·감속 제어를 우선 점검하세요.',lo:'UCL·어깨 과부하 패턴이 다수 발견됩니다. 전문가 점검을 강력히 권장합니다.'},
    power:{hi:'구속을 위한 충분한 파워 베이스가 갖춰져 있습니다.',mid:'스쿼트 1.5배, CMJ 50cm+, 멀리뛰기 키 이상을 6개월 목표로 설정하세요.',lo:'파워가 구속의 병목입니다. 스쿼트·데드리프트·친업을 최우선 훈련으로 시작하세요.'},
    mob:{hi:'고관절·흉추·어깨 가동성이 양호합니다.',mid:'일부 제한 부위에 집중 개입이 필요합니다. 매일 10분 가동성 루틴을 시작하세요.',lo:'가동성 제한이 힘 전달과 부상 위험 모두에 영향을 주고 있습니다. 매일 15분 루틴이 필수입니다.'},
    stab:{hi:'코어와 착지 안정성이 우수합니다.',mid:'착지 또는 코어 안정성 중 한 부분 보완이 필요합니다.',lo:'안정성 부족이 폼 일관성을 방해합니다. 플랭크·싱글레그·데드행 훈련을 즉시 시작하세요.'},
    seq:{hi:'착지 타이밍·골반 선행 회전·팔 경로가 효율적입니다.',mid:'일부 타이밍 또는 착지 구조에 비효율이 있습니다.',lo:'운동사슬 순서에 다수의 비효율이 있습니다. 기초 타이밍 드릴부터 재점검이 필요합니다.'},
  };

  const prio = [];
  if (sc.power < 45) prio.push({rank:'1순위',title:'하체 파워 기초 구축',desc:'스쿼트 주 3회 (3×5~8rep, 점진적 과부하), 데드리프트 주 2회. CMJ 50cm, 멀리뛰기 키 이상, 친업 8개를 6개월 1차 목표로 설정.'});
  if (sc.mob < 45) prio.push({rank:(sc.power<45?'2':'1')+'순위',title:'가동성 루틴 시작',desc:'매일 아침 15분: Sleeper Stretch 3×30초, 흉추 회전 스트레칭 2×10회, 고관절 내회전 스트레칭 2×30초, Cross-body Stretch 2×30초.'});
  if (seq) prio.push({rank:prio.length+1+'순위',title:'타이밍 드릴',desc:'착지 순간 골반 방향 인지 훈련. 거울·영상 피드백 활용. Hip-shoulder separation 메디신볼 드릴.'});
  if (!seq && sc.stab < 45) prio.push({rank:prio.length+1+'순위',title:'착지 안정성 강화',desc:'싱글레그 스쿼트 주 3회 (3×8), 플랭크 2분 달성, 데드행 60초 달성, 앞다리 브레이크 드릴.'});
  prio.push({rank:'필수',title:'부하 관리',desc:'주당 투구 구수·등판 간격 기록. 팔꿈치·어깨 통증 2일 이상 지속 시 즉시 휴식 + 전문의 상담. 비시즌 최소 2개월 완전 휴식.'});

  const scoreCards = axes.map(([l,v]) =>
    `<div class="score-card">
      <div class="score-lbl">${l}</div>
      <div class="score-bar-bg"><div class="score-bar" style="width:${v}%;background:${bc(v)}"></div></div>
      <div class="score-val" style="color:${bc(v)}">${v}<span class="score-sub"> /100</span></div>
    </div>`).join('');

  const detailLines = axes.map(([l,v,k]) => {
    const t = v>=70 ? axTxt[k].hi : v>=45 ? axTxt[k].mid : axTxt[k].lo;
    return `<b>${l} (${v}점)</b> — ${t}<br><br>`;
  }).join('');

  const prioItems = prio.map(p =>
    `<div class="prio-item">
      <div class="prio-tag">${p.rank}</div>
      <div class="prio-title">${p.title}</div>
      <div class="prio-desc">${p.desc}</div>
    </div>`).join('');

  document.getElementById('result').innerHTML = `
    <div class="result">
      <div class="r-hero">
        <div class="r-label">Assessment Result</div>
        <div class="r-type">${type}</div>
        <div class="r-desc">${desc}</div>
      </div>

      <div class="score-grid">${scoreCards}</div>

      ${alerts.join('')}

      <div class="tag-row">
        <div class="tag-lbl">위험 요인</div>
        ${risks.map(r=>`<span class="tag tag-risk">${r}</span>`).join('')}
      </div>
      <div class="tag-row" style="margin-top:12px">
        <div class="tag-lbl">우선 개선 방향</div>
        ${fixes.map(f=>`<span class="tag tag-fix">${f}</span>`).join('')}
      </div>

      <div style="margin-top:24px"></div>

      <div class="detail-block">
        <div class="detail-header">영역별 세부 분석</div>
        <div class="detail-body">${detailLines}</div>
      </div>

      <div class="detail-block">
        <div class="detail-header">우선순위 처방</div>
        ${prioItems}
      </div>

      <button class="reset-btn" onclick="resetAll()">↩ 다시 평가하기</button>
    </div>`;

  document.getElementById('result').scrollIntoView({behavior:'smooth', block:'start'});
}

function resetAll() {
  Object.keys(answers).forEach(k => delete answers[k]);
  document.getElementById('result').innerHTML = '';
  render();
  window.scrollTo({top:0, behavior:'smooth'});
}

render();
</script>
</body>
</html>
