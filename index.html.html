<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PitchIQ — 투수 부상 위험 & 퍼포먼스 자가 진단</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0a;
  --bg2: #111111;
  --bg3: #1a1a1a;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.15);
  --text: #f0f0f0;
  --text2: #888;
  --text3: #555;
  --accent: #e8ff47;
  --red: #ff4444;
  --green: #47ff8a;
  --blue: #4488ff;
  --amber: #ffaa33;
  --radius: 12px;
  --radius-sm: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px; line-height: 1.6; min-height: 100vh; }

.header {
  border-bottom: 1px solid var(--border);
  padding: 18px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky; top: 0;
  background: rgba(10,10,10,0.96);
  backdrop-filter: blur(12px);
  z-index: 100;
}
.logo { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--accent); letter-spacing: 0.08em; }
.prog-wrap { display: flex; align-items: center; gap: 10px; }
.prog-text { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text3); }
.prog-bar { width: 100px; height: 3px; background: var(--bg3); border-radius: 2px; overflow: hidden; }
.prog-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.4s ease; }

.hero { padding: 64px 24px 48px; max-width: 720px; margin: 0 auto; }
.hero-label { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--accent); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 16px; }
.hero h1 { font-size: clamp(26px, 5vw, 40px); font-weight: 600; line-height: 1.15; margin-bottom: 14px; letter-spacing: -0.02em; }
.hero h1 span { color: var(--accent); }
.hero p { color: var(--text2); font-size: 14px; max-width: 500px; line-height: 1.7; margin-bottom: 24px; }
.badges { display: flex; flex-wrap: wrap; gap: 7px; }
.badge { font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 500; border: 1px solid; }
.badge-vel { color: #47ff8a; border-color: rgba(71,255,138,0.3); background: rgba(71,255,138,0.07); }
.badge-inj { color: #ff7777; border-color: rgba(255,119,119,0.3); background: rgba(255,119,119,0.07); }
.badge-both { color: #b8a4ff; border-color: rgba(184,164,255,0.3); background: rgba(184,164,255,0.07); }
.badge-stab { color: #ffaa33; border-color: rgba(255,170,51,0.3); background: rgba(255,170,51,0.07); }

.main { max-width: 720px; margin: 0 auto; padding: 0 24px 80px; }
.section { margin-bottom: 40px; }
.sec-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
.sec-num { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--accent); letter-spacing: 0.1em; }
.sec-title { font-size: 14px; font-weight: 500; }
.sec-desc { font-size: 11px; color: var(--text3); margin-left: auto; }

.q-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 10px; transition: border-color 0.2s; }
.q-card.answered { border-color: rgba(232,255,71,0.15); }
.q-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
.q-num { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text3); }
.q-badge { font-size: 10px; padding: 2px 8px; border-radius: 20px; font-weight: 500; }
.q-text { font-size: 14px; font-weight: 500; line-height: 1.6; margin-bottom: 10px; }
.q-sub { font-size: 12px; color: var(--text2); margin-bottom: 12px; line-height: 1.6; padding: 8px 12px; background: var(--bg3); border-radius: var(--radius-sm); border-left: 2px solid var(--border2); }

.bench-wrap { margin-bottom: 12px; overflow-x: auto; }
.bench-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.bench-table th { text-align: left; padding: 6px 10px; color: var(--text3); font-weight: 500; background: var(--bg3); font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.05em; }
.bench-table td { padding: 6px 10px; border-top: 1px solid var(--border); color: var(--text2); }
.bench-table tr:last-child td { color: var(--accent); font-weight: 500; }

.opts { display: flex; flex-direction: column; gap: 6px; }
.opt { display: flex; align-items: flex-start; gap: 10px; padding: 10px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); cursor: pointer; font-size: 13px; color: var(--text2); background: transparent; text-align: left; width: 100%; transition: all 0.15s; line-height: 1.5; }
.opt:hover { border-color: var(--border2); color: var(--text); background: var(--bg3); }
.opt.sel { border-color: var(--accent); background: rgba(232,255,71,0.06); color: var(--accent); }
.opt-k { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text3); min-width: 16px; padding-top: 1px; flex-shrink: 0; }
.opt.sel .opt-k { color: var(--accent); }
.q-note { font-size: 11px; color: var(--text3); margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); line-height: 1.6; }

.submit-wrap { padding: 24px 0; }
.submit-btn { width: 100%; padding: 16px; background: var(--accent); border: none; border-radius: var(--radius); font-size: 15px; font-weight: 600; cursor: pointer; color: #0a0a0a; font-family: 'DM Sans', sans-serif; letter-spacing: -0.01em; transition: all 0.2s; }
.submit-btn:hover:not(:disabled) { background: #f5ff6e; transform: translateY(-1px); }
.submit-btn:disabled { opacity: 0.2; cursor: not-allowed; transform: none; }

/* RESULT */
.result { padding: 40px 0; }
.r-hero { margin-bottom: 28px; padding: 32px; background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); position: relative; overflow: hidden; }
.r-hero::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, var(--accent), transparent); }
.r-label { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--accent); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 8px; }
.r-type { font-size: 22px; font-weight: 600; margin-bottom: 10px; letter-spacing: -0.02em; line-height: 1.3; }
.r-desc { font-size: 13px; color: var(--text2); line-height: 1.75; max-width: 560px; }

/* RADAR */
.radar-wrap { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; margin-bottom: 16px; display: flex; flex-direction: column; align-items: center; }
.radar-title { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text3); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 20px; align-self: flex-start; }
#radarChart { max-width: 320px; width: 100%; }
.radar-legend { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; width: 100%; margin-top: 20px; }
.rl-item { background: var(--bg3); border-radius: var(--radius-sm); padding: 10px 12px; }
.rl-label { font-size: 11px; color: var(--text3); margin-bottom: 4px; font-family: 'DM Mono', monospace; }
.rl-val { font-size: 16px; font-weight: 600; font-family: 'DM Mono', monospace; }

.alert { padding: 12px 16px; border-radius: var(--radius-sm); margin-bottom: 8px; font-size: 12px; line-height: 1.7; border: 1px solid; }
.alert-red { background: rgba(255,68,68,0.08); border-color: rgba(255,68,68,0.25); color: #ff9999; }
.alert-amber { background: rgba(255,170,51,0.08); border-color: rgba(255,170,51,0.25); color: #ffbb66; }
.alert-green { background: rgba(71,255,138,0.08); border-color: rgba(71,255,138,0.25); color: #66ffaa; }

.tag-row { margin-bottom: 14px; }
.tag-lbl { font-size: 11px; font-weight: 500; color: var(--text3); margin-bottom: 6px; font-family: 'DM Mono', monospace; letter-spacing: 0.05em; text-transform: uppercase; }
.tag { display: inline-block; font-size: 11px; padding: 4px 10px; border-radius: 20px; margin: 3px 3px 0 0; font-weight: 500; }
.tag-risk { background: rgba(255,68,68,0.1); color: #ff9999; border: 1px solid rgba(255,68,68,0.2); }
.tag-fix { background: rgba(71,255,138,0.08); color: #66ffaa; border: 1px solid rgba(71,255,138,0.2); }

.detail-block { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 12px; }
.detail-header { padding: 12px 20px; font-size: 11px; font-weight: 500; color: var(--text3); background: var(--bg3); border-bottom: 1px solid var(--border); font-family: 'DM Mono', monospace; letter-spacing: 0.08em; text-transform: uppercase; }
.detail-body { padding: 20px; font-size: 13px; color: var(--text2); line-height: 1.9; }
.detail-body b { color: var(--text); font-weight: 500; }

/* WEEKLY PROGRAM */
.program-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px; padding: 16px 20px; }
.day-card { background: var(--bg3); border-radius: var(--radius-sm); padding: 14px; }
.day-label { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--accent); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 8px; }
.day-items { list-style: none; }
.day-items li { font-size: 12px; color: var(--text2); padding: 3px 0; border-bottom: 1px solid var(--border); line-height: 1.5; }
.day-items li:last-child { border-bottom: none; }
.day-items li::before { content: '—'; color: var(--text3); margin-right: 6px; font-family: 'DM Mono', monospace; }

.prio-item { padding: 16px 20px; border-bottom: 1px solid var(--border); }
.prio-item:last-child { border-bottom: none; }
.prio-tag { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--accent); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 4px; }
.prio-title { font-size: 14px; font-weight: 500; margin-bottom: 4px; }
.prio-desc { font-size: 12px; color: var(--text2); line-height: 1.7; }

/* FEEDBACK */
.feedback-block { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px; margin-top: 24px; text-align: center; }
.feedback-title { font-size: 15px; font-weight: 500; margin-bottom: 6px; }
.feedback-desc { font-size: 13px; color: var(--text2); margin-bottom: 20px; line-height: 1.6; }
.feedback-btn { display: inline-block; padding: 13px 32px; background: transparent; border: 1px solid var(--accent); border-radius: var(--radius); font-size: 13px; font-weight: 500; color: var(--accent); text-decoration: none; font-family: 'DM Sans', sans-serif; transition: all 0.2s; cursor: pointer; }
.feedback-btn:hover { background: rgba(232,255,71,0.08); }

.reset-btn { display: block; width: 100%; padding: 14px; background: transparent; border: 1px solid var(--border2); border-radius: var(--radius); font-size: 13px; color: var(--text2); cursor: pointer; font-family: 'DM Sans', sans-serif; margin-top: 10px; transition: all 0.15s; }
.reset-btn:hover { border-color: var(--border2); color: var(--text); background: var(--bg2); }

::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 3px; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">PITCHER / ASSESSMENT v7.0</div>
  <div class="prog-wrap">
    <span class="prog-text" id="prog-txt">0 / 36</span>
    <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
  </div>
</div>

<div id="app">
  <div class="hero">
    <div class="hero-label">Sports Science Based Evaluation</div>
    <h1>투수 부상 위험 &<br><span>퍼포먼스 자가 진단</span></h1>
    <p>바이오메카닉스 + 스포츠 과학 논문 기반의 투수 전용 자가 진단.<br>메카닉 파트는 실제 감각 그대로, 피지컬 파트는 테스트 후 답하세요.</p>
    <div class="badges">
      <span class="badge badge-vel">구속</span>
      <span class="badge badge-inj">부상예방</span>
      <span class="badge badge-both">구속+부상예방</span>
      <span class="badge badge-stab">안정성</span>
    </div>
  </div>

  <div class="main">
    <div id="questions"></div>
    <div class="submit-wrap">
      <button class="submit-btn" id="submit-btn" disabled onclick="showResult()">결과 분석하기 →</button>
    </div>
    <div id="result"></div>
  </div>
</div>

<script>
const SECTIONS = [
  {
    num:'01', title:'정적 자세 & 기본 움직임 패턴', desc:'일상 움직임 기반 스크리닝',
    qs:[
      {id:'q1',badge:'bi',q:'팔을 옆으로 들어올릴 때 어깨가 어떻게 되나요?',
       opts:['어깨 전체가 귀 쪽으로 같이 올라간다','어깨는 거의 그대로, 팔만 올라간다','확인하기 어렵다'],
       note:'견갑골 상방회전 패턴 — A는 상부 승모근 우세·전거근 약화. 투구 가속 구간에서 팔꿈치 부담 증가'},
      {id:'q2',badge:'bi',q:'바닥에 있는 물건을 집을 때 자연스럽게 어떻게 하나요?',
       opts:['허리를 앞으로 숙여서 든다','무릎을 굽히고 엉덩이를 뒤로 빼며 내려간다','무릎을 굽히지만 상체도 많이 숙인다'],
       note:'힙 힌지 패턴 — 투구 로딩 단계 햄스트링·둔근 활성화와 직결'},
      {id:'q3',badge:'bi',q:'등을 벽에 기대고 서서 어깨뼈 상태를 확인해보세요.',
       sub:'거울로 뒷모습을 보거나 다른 사람에게 확인해달라 해도 됩니다.',
       opts:['한쪽 어깨뼈가 날개처럼 뜨거나 튀어나와 있다','양쪽이 비슷하게 납작하게 붙어 있다'],
       note:'견갑골 이상운동(Scapular Dyskinesis) 선별 — 이 패턴 있는 투수 어깨 부상 위험 25~43% 증가 (Hickey et al., 2018)'},
      {id:'q4',badge:'bi',q:'앞으로 숙였다가 상체를 펼 때 어느 부위가 먼저 움직이나요?',
       opts:['허리(요추)가 먼저 꺾인다','엉덩이가 먼저 열리며 허리가 따라온다','잘 구분이 안 된다'],
       note:'요추-골반 리듬 — A는 요추 과가동성·고관절 가동범위 부족 패턴'},
    ]
  },
  {
    num:'02', title:'투구 메카닉스 — 로딩 & 스트라이드', desc:'힘 저장 구간 감각 기술형',
    qs:[
      {id:'q5',badge:'bb',q:'뒷발로 지면을 밀 때 힘이 어느 방향으로 향하나요?',
       sub:'눈을 감고 실제 동작을 천천히 재현하며 느껴보세요.',
       opts:['위로 솟구치는 느낌 — 몸이 뜬다','홈 플레이트 방향으로 밀리는 느낌','힘이 분산되어 방향을 잘 모르겠다'],
       note:'지면반력 방향 — A는 수직력 손실. 이상적 스트라이드 길이 신장의 80~87% (Fleisig et al., 프로 평균 83%)'},
      {id:'q6',badge:'bb',q:'스트라이드 발이 착지하는 위치는 어디인가요?',
       sub:'착지 발이 뒷발과 비교해 어느 방향에 내려가는지 느껴보세요.',
       opts:['몸 안쪽(글러브 쪽)으로 교차해서 착지한다','뒷발과 거의 일직선으로 착지한다','몸 바깥쪽(팔 쪽)으로 벌어진다'],
       note:'착지 발 위치 — A(크로스오버)는 골반 회전을 막아 구속 손실. B가 이상적'},
      {id:'q7',badge:'bb',q:'착지 발의 발끝이 어느 방향을 향하나요?',
       opts:['홈 방향으로 정면을 향한다','홈 방향에서 10~20° 안쪽(닫힘)을 향한다','홈 방향에서 바깥(열림)으로 크게 향한다'],
       note:'착지 발 각도 — B(약간 닫힘)가 이상적. A는 조기 골반 개방, C는 발목·무릎 스트레스'},
      {id:'q8',badge:'bb',q:'착지 순간 골반(배꼽)이 어느 방향을 향하고 있나요? (우투수 기준)',
       sub:'착지 순간의 감각을 떠올려 보세요.',
       opts:['이미 홈 방향으로 완전히 열려 있다','3루 방향으로 약간 닫혀 있다 (30~40° 정도)','타자와 거의 정면으로 마주하고 있다'],
       note:'착지 시 골반 각도 — B가 최적 (프로 평균 33±10° 개방). A는 hip-shoulder separation 소멸 → UCL varus torque 급증'},
    ]
  },
  {
    num:'03', title:'투구 메카닉스 — 가속 & 릴리즈', desc:'힘 전달·팔 경로 감각 기술형',
    qs:[
      {id:'q9',badge:'bb',q:'착지 후 골반이 먼저 돌고 어깨가 따라오는 시간차가 느껴지나요?',
       opts:['시간차 없이 골반과 어깨가 거의 동시에 돈다','골반이 먼저 열리고 어깨는 잠깐 뒤에 따라온다','어깨가 오히려 먼저 열리는 느낌이다'],
       note:'Hip-shoulder separation 감각 — B가 이상적. 구속과 가장 강한 상관관계 (Sgroi et al., 2015)'},
      {id:'q10',badge:'bb',q:'릴리즈 순간 몸통이 어느 방향으로 기울어지나요?',
       sub:'공이 손에서 떠나는 순간의 상체 기울기를 느껴보세요.',
       opts:['거의 수직으로 서 있다','앞으로 기울며 글러브 쪽으로도 약간 기운다','뒤로 젖혀진다'],
       note:'상체 기울기 — B가 이상적 (프로 평균: 전방 36±7°, 측방 23±10°). 기울기 클수록 구속↑ (Solomito et al.)'},
      {id:'q11',badge:'bb',q:'릴리즈 직전 던지는 팔꿈치 높이가 어깨 라인 대비 어떤가요?',
       opts:['어깨보다 확연히 낮다 — 팔꿈치가 처진다','어깨 높이와 거의 같거나 약간 위다','어깨보다 많이 높이 올라간다'],
       note:'팔꿈치 높이 — A(elbow drop)는 UCL varus torque 급증. 이상적 어깨 외전각 90~94° (Fleisig)'},

const BADGE_STYLE = {
  bv:{label:'구속',cls:'badge-vel'},
  bi:{label:'부상예방',cls:'badge-inj'},
  bb:{label:'구속+부상예방',cls:'badge-both'},
  bs:{label:'안정성',cls:'badge-stab'},
};

const answers = {};
const TOTAL = SECTIONS.reduce((a,s)=>a+s.qs.length,0);

function benchHtml(rows){
  if(!rows) return '';
  const head = rows[0].map(h=>`<th>${h}</th>`).join('');
  const body = rows.slice(1).map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join('')}</tr>`).join('');
  return `<div class="bench-wrap"><table class="bench-table"><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table></div>`;
}

function render(){
  const container = document.getElementById('questions');
  container.innerHTML = '';
  let qNum = 0;
  SECTIONS.forEach(sec=>{
    const sd = document.createElement('div');
    sd.className = 'section';
    sd.innerHTML = `<div class="sec-header">
      <span class="sec-num">${sec.num}</span>
      <span class="sec-title">${sec.title}</span>
      <span class="sec-desc">${sec.desc}</span>
    </div>`;
    sec.qs.forEach(q=>{
      qNum++;
      const n = qNum;
      const b = BADGE_STYLE[q.badge];
      const card = document.createElement('div');
      card.className = `q-card${answers[q.id]!==undefined?' answered':''}`;
      card.id = `card-${q.id}`;
      const opts = q.opts.map((o,i)=>
        `<button class="opt${answers[q.id]===i?' sel':''}" onclick="pick('${q.id}',${i},this)">
          <span class="opt-k">${String.fromCharCode(65+i)}</span>
          <span>${o}</span>
        </button>`).join('');
      card.innerHTML = `
        <div class="q-meta">
          <span class="q-num">Q${n}</span>
          <span class="q-badge badge ${b.cls}">${b.label}</span>
        </div>
        <div class="q-text">${q.q}</div>
        ${q.sub?`<div class="q-sub">${q.sub}</div>`:''}
        ${q.bench?benchHtml(q.bench):''}
        <div class="opts">${opts}</div>
        ${q.note?`<div class="q-note">📌 ${q.note}</div>`:''}`;
      sd.appendChild(card);
    });
    container.appendChild(sd);
  });
  updateProgress();
}

function pick(id,val,el){
  answers[id] = val;
  el.closest('.opts').querySelectorAll('.opt').forEach(b=>b.classList.remove('sel'));
  el.classList.add('sel');
  const card = document.getElementById(`card-${id}`);
  if(card) card.classList.add('answered');
  updateProgress();
}

function updateProgress(){
  const done = Object.keys(answers).length;
  const pct = Math.round(done/TOTAL*100);
  document.getElementById('prog-txt').textContent = `${done} / ${TOTAL}`;
  document.getElementById('prog-fill').style.width = `${pct}%`;
  document.getElementById('submit-btn').disabled = done < TOTAL;
}

function calcScores(){
  const axes = {vel:{s:0,m:0},inj:{s:0,m:0},power:{s:0,m:0},mob:{s:0,m:0},stab:{s:0,m:0},seq:{s:0,m:0}};
  Object.entries(SCORE_MAP).forEach(([k,v])=>{
    const a = answers[k];
    if(a===undefined) return;
    Object.entries(v).forEach(([axis,w])=>{
      if(!w||!axes[axis]) return;
      const score = Array.isArray(w)?w[Math.min(a,w.length-1)]:w;
      const max = Array.isArray(w)?Math.max(...w):w;
      axes[axis].s += score; axes[axis].m += max;
    });
  });
  const out = {};
  Object.entries(axes).forEach(([k,v])=>{ out[k] = v.m>0?Math.round(v.s/v.m*100):0; });
  return out;
}

function bc(p){ return p>=70?'#47ff8a':p>=45?'#4488ff':'#ff4444'; }

function drawRadar(sc){
  const canvas = document.getElementById('radarChart');
  if(!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.width = 300;
  const H = canvas.height = 300;
  const cx = W/2, cy = H/2, R = 110;
  const labels = ['구속\n잠재력','부상\n안전도','하체\n파워','가동성','안정성','메카닉\n효율'];
  const vals = [sc.vel,sc.inj,sc.power,sc.mob,sc.stab,sc.seq].map(v=>v/100);
  const N = 6;
  ctx.clearRect(0,0,W,H);

  // grid
  for(let r=1;r<=4;r++){
    ctx.beginPath();
    for(let i=0;i<N;i++){
      const ang = (Math.PI*2*i/N)-Math.PI/2;
      const x = cx + Math.cos(ang)*R*(r/4);
      const y = cy + Math.sin(ang)*R*(r/4);
      i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    }
    ctx.closePath();
    ctx.strokeStyle = 'rgba(255,255,255,0.07)';
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  // spokes
  for(let i=0;i<N;i++){
    const ang = (Math.PI*2*i/N)-Math.PI/2;
    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.lineTo(cx+Math.cos(ang)*R, cy+Math.sin(ang)*R);
    ctx.strokeStyle = 'rgba(255,255,255,0.07)';
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  // data fill
  ctx.beginPath();
  vals.forEach((v,i)=>{
    const ang = (Math.PI*2*i/N)-Math.PI/2;
    const x = cx + Math.cos(ang)*R*v;
    const y = cy + Math.sin(ang)*R*v;
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  });
  ctx.closePath();
  ctx.fillStyle = 'rgba(232,255,71,0.12)';
  ctx.fill();
  ctx.strokeStyle = '#e8ff47';
  ctx.lineWidth = 2;
  ctx.stroke();

  // dots
  vals.forEach((v,i)=>{
    const ang = (Math.PI*2*i/N)-Math.PI/2;
    const x = cx + Math.cos(ang)*R*v;
    const y = cy + Math.sin(ang)*R*v;
    ctx.beginPath();
    ctx.arc(x,y,4,0,Math.PI*2);
    ctx.fillStyle = '#e8ff47';
    ctx.fill();
  });

  // labels
  ctx.font = '500 11px DM Sans, sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.textAlign = 'center';
  labels.forEach((l,i)=>{
    const ang = (Math.PI*2*i/N)-Math.PI/2;
    const dist = R + 22;
    const x = cx + Math.cos(ang)*dist;
    const y = cy + Math.sin(ang)*dist;
    const lines = l.split('\n');
    lines.forEach((line,li)=>{
      ctx.fillText(line, x, y + li*14 - (lines.length-1)*7);
    });
  });
}

      <div class="feedback-block">
        <div class="feedback-title">이 결과가 도움이 되었나요?</div>
        <div class="feedback-desc">짧은 피드백을 남겨주시면 평가 시스템 개선에 큰 도움이 됩니다.<br>1분이면 충분합니다.</div>
        <a class="feedback-btn" href="https://docs.google.com/forms/d/e/1FAIpQLSfgpUCrcO9R3TXsFmU6AtcnvBgaTEJxWokNUn0988tr9JmtdQ/viewform" target="_blank">피드백 남기기 →</a>
      </div>

      <button class="reset-btn" onclick="resetAll()">↩ 다시 평가하기</button>
    </div>`;

  document.getElementById('result').scrollIntoView({behavior:'smooth',block:'start'});
  setTimeout(()=>drawRadar(sc), 100);
}

function resetAll(){
  Object.keys(answers).forEach(k=>delete answers[k]);
  document.getElementById('result').innerHTML = '';
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}

render();
</script>
</body>
</html>
